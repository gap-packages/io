name: CI

# Trigger the workflow on push or pull request or manually
on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:

# the `concurrency` settings ensure that not too many CI jobs run in parallel
concurrency:
  # group by workflow and ref; the last slightly strange component ensures that for pull
  # requests, we limit to 1 concurrent job, but for the default repository branch we don't
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref_name != github.event.repository.default_branch || github.run_number }}
  # Cancel intermediate builds, but only if it is a pull request build.
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  # The CI test job
  test:
    name: ${{ matrix.os }} - GAP ${{ matrix.gap-version }} - coverage ${{ matrix.coverage }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu
        coverage:
          - true
        GAP_PKGS_TO_BUILD:
          - profiling
        gap-version:
          - devel
          - '4.16'
          - '4.15'
          - '4.14'
          - '4.13'
          - '4.12'
        include:
          - os: ubuntu
            gap-version: devel
            GAP_PKGS_TO_BUILD: ''
            coverage: 'false'
          - os: ubuntu
            gap-version: devel
            GAP_PKGS_TO_BUILD: 'profiling'
            coverage: true
          - os: macos
            gap-version: devel
            GAP_PKGS_TO_BUILD: 'profiling'
            coverage: true
          - os: windows
            gap-version: devel
            GAP_PKGS_TO_BUILD: 'profiling'
            coverage: true

    steps:
      - uses: actions/checkout@v6
      - uses: gap-actions/setup-cygwin@v2
        if: ${{ runner.os == 'Windows' }}
      - uses: gap-actions/setup-gap@v3
        with:
          gap-version: ${{ matrix.gap-version }}
      - uses: gap-actions/build-pkg@v3
      - uses: gap-actions/run-pkg-tests@v4
        with:
          coverage: ${{ matrix.coverage }}
      - uses: gap-actions/run-pkg-tests@v4
        with:
          coverage: ${{ matrix.coverage }}
          mode: 'onlyneeded'
      - uses: gap-actions/process-coverage@v3
        if: ${{ matrix.coverage == true }}
      - uses: codecov/codecov-action@v6
        if: ${{ matrix.coverage == true }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
